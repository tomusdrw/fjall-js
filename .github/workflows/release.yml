name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
            output: fjall.darwin-arm64.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: fjall.linux-x64-gnu.node
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build native module
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Patch loader for ESM-bundler compatibility
        run: node scripts/patch-esm-loader.mjs

      - name: Run tests
        run: npm test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fjall-${{ matrix.target }}
          path: ${{ matrix.output }}
          if-no-files-found: error

      # The generated + ESM-patched loader and the type defs are identical across
      # targets, so upload them once (from the Linux build) for the publish job,
      # which does not run `napi build` and so cannot regenerate them itself.
      - name: Upload JS bindings for the main package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: bindings
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [build]
    runs-on: ubuntu-latest
    environment: release
    # id-token: write enables npm OIDC trusted publishing (no NPM_TOKEN secret).
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # OIDC trusted publishing requires npm >= 11.5.1; the npm bundled with
        # Node 22 is 10.x, so upgrade explicitly.
        run: npm install -g npm@latest

      - name: Install npm dependencies
        run: npm ci

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # Distributes artifacts/**/fjall.<triple>.node into the matching
      # npm/<triple>/ package dir (and a copy at the repo root for the GitHub
      # release below). Reads from ./artifacts, so keep the download un-flattened.
      - name: Place native binaries into platform packages
        run: npx napi artifacts

      # The publish job never runs `napi build`, so restore the generated loader
      # and type defs (uploaded by the build job) — they are the main package's
      # only shipped files (see "files" in package.json).
      - name: Restore generated loader for the main package
        run: |
          set -euo pipefail
          cp artifacts/bindings/index.js artifacts/bindings/index.d.ts .
          ls -la index.js index.d.ts

      # Add the per-platform optionalDependencies (deliberately kept out of the
      # committed manifest so `npm ci` stays valid) to the main package that is
      # about to be published. Does NOT publish anything — unlike `napi
      # prepublish`, which would also publish the platform packages (without
      # provenance) and duplicate the explicit steps below.
      - name: Pin optionalDependencies on the main package
        run: node scripts/pin-optional-deps.mjs

      # No NODE_AUTH_TOKEN: auth and provenance both come from the GitHub OIDC
      # token via npm trusted publishing. Each package must have a trusted
      # publisher configured on npmjs.com (see README) pointing at this repo,
      # workflow, and the `release` environment.
      - name: Publish @fjall-js/fjall-darwin-arm64
        run: npm publish --access public --provenance
        working-directory: npm/darwin-arm64

      - name: Publish @fjall-js/fjall-linux-x64-gnu
        run: npm publish --access public --provenance
        working-directory: npm/linux-x64-gnu

      - name: Publish @fjall-js/fjall (main)
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            fjall.darwin-arm64.node
            fjall.linux-x64-gnu.node
