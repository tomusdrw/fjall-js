name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: prettier
        run: npx prettier --check .

  build-and-test:
    name: Build & test (${{ matrix.target }})
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
            output: fjall.darwin-arm64.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: fjall.linux-x64-gnu.node
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build native module
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Patch loader for ESM-bundler compatibility
        run: node scripts/patch-esm-loader.mjs

      - name: Type-check (needs generated index.d.ts from the build above)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fjall-${{ matrix.target }}
          path: ${{ matrix.output }}
          if-no-files-found: error
